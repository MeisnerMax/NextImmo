name: Flutter

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: flutter-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.29.2
          channel: stable
          cache: true
      - name: Resolve locked dependencies
        run: flutter pub get --enforce-lockfile
      - name: Analyze
        run: flutter analyze --no-pub
      - name: Test
        run: flutter test --no-pub
      - name: Build web
        run: flutter build web --no-pub

  database:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: 2.109.1
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.29.2
          channel: stable
          cache: true
      - name: Resolve locked dependencies
        run: flutter pub get --enforce-lockfile
      - name: Start local Supabase
        run: supabase start
      - name: Reset and apply migrations
        run: supabase db reset --local --no-seed
      - name: Lint database
        run: supabase db lint --local --schema public --level error --fail-on error
      - name: Check database advisors
        run: |
          supabase db advisors --local --type security --level info --fail-on error
          supabase db advisors --local --type performance --level info --fail-on error
      - name: Test database
        run: supabase test db --local
      - name: Test P1-017, P1-011 and P1-004 rollback
        shell: pwsh
        run: |
          supabase migration down --local --last 1 --yes
          supabase test db --local supabase/tests_rollback/005_p1_017_down.test.sql
          supabase migration down --local --last 3 --yes
          supabase test db --local supabase/tests_rollback/004_p1_011_down.test.sql
          supabase migration down --local --last 1 --yes
          supabase test db --local supabase/tests_rollback/003_p1_004_down.test.sql
          supabase migration up --local
          supabase test db --local
      - name: Test P1-004 concurrency
        shell: pwsh
        run: ./tool/verify_p1_004_concurrency.ps1
      - name: Test P1-007 real client integration
        shell: pwsh
        run: ./tool/verify_p1_007_integration.ps1
      - name: Test P1-011 Realtime integration
        shell: pwsh
        run: ./tool/verify_p1_011_e2e.ps1
      - name: Test P1-014 restore target guards
        shell: pwsh
        run: ./tool/test_p1_014_backup_restore_guard.ps1
      - name: Test P1-014 corrupt archive guard
        shell: pwsh
        run: ./tool/verify_p1_014_backup_restore.ps1 -TestCorruptArchive
      - name: Test P1-014 local backup restore drill
        shell: pwsh
        run: ./tool/verify_p1_014_backup_restore.ps1
      - name: Stop local Supabase
        if: always()
        run: supabase stop --no-backup
